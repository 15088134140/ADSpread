<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建发布计划 - 弹窗原型</title>
    <style>
        :root {
            /* Design Tokens */
            --primary-50: #f0f9ff;
            --primary-100: #e0f2fe;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-900: #1e3a8a;

            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-500: #6b7280;
            --neutral-700: #374151;
            --neutral-900: #111827;

            --danger-500: #ef4444;
            --success-500: #10b981;

            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.25rem;

            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);

            --radius-sm: 0.25rem;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--neutral-100);
            padding: var(--space-8);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Modal Backdrop */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        /* Modal Container */
        .modal {
            background-color: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Modal Header */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-6) var(--space-6) var(--space-4);
            border-bottom: 1px solid var(--neutral-200);
        }

        .modal-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            color: var(--neutral-900);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--neutral-500);
            cursor: pointer;
            padding: var(--space-1);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background-color: var(--neutral-100);
            color: var(--neutral-700);
        }

        /* Modal Body */
        .modal-body {
            padding: var(--space-6);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: var(--space-6);
        }

        .form-label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--neutral-700);
            margin-bottom: var(--space-2);
        }

        .form-label .required {
            color: var(--danger-500);
        }

        .form-control {
            display: block;
            width: 100%;
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-size-base);
            line-height: 1.5;
            color: var(--neutral-900);
            background-color: white;
            border: 1px solid var(--neutral-300);
            border-radius: var(--radius-md);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        .form-control::placeholder {
            color: var(--neutral-500);
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: var(--space-4);
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 1rem;
            height: 1rem;
            margin-right: var(--space-2);
            cursor: pointer;
        }

        .radio-label {
            font-size: var(--font-size-base);
            color: var(--neutral-700);
            cursor: pointer;
        }

        /* Weekday Selector */
        .weekday-container {
            display: flex;
            gap: var(--space-2);
        }

        .weekday-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .weekday-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            font-size: var(--font-size-base);
            color: var(--neutral-700);
            background-color: white;
            border: 2px solid var(--neutral-300);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .weekday-checkbox:hover + .weekday-label {
            border-color: var(--primary-500);
            background-color: var(--primary-50);
        }

        .weekday-checkbox:checked + .weekday-label {
            background-color: var(--primary-500);
            border-color: var(--primary-500);
            color: white;
        }

        .weekday-checkbox:focus + .weekday-label {
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        /* Quick Select Buttons */
        .weekday-quick-select {
            display: flex;
            gap: var(--space-2);
            margin-top: var(--space-3);
        }

        .quick-select-btn {
            padding: var(--space-1) var(--space-3);
            font-size: var(--font-size-xs);
            color: var(--primary-600);
            background-color: var(--primary-50);
            border: 1px solid var(--primary-100);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-select-btn:hover {
            background-color: var(--primary-100);
            border-color: var(--primary-500);
        }

        /* Help Text */
        .help-text {
            margin-top: var(--space-2);
            font-size: var(--font-size-xs);
            color: var(--neutral-500);
        }

        /* Date Row */
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        /* Selected Targets */
        .selected-targets {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            padding: var(--space-3);
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius-md);
            background-color: var(--neutral-50);
            min-height: 44px;
        }

        .target-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-2);
            background-color: var(--primary-50);
            border: 1px solid var(--primary-100);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            color: var(--primary-700);
        }

        .target-tag-remove {
            background: none;
            border: none;
            color: var(--primary-500);
            cursor: pointer;
            padding: 0;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .target-tag-remove:hover {
            background-color: var(--primary-100);
        }

        /* Select Target Button */
        .select-target-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-3) var(--space-4);
            background-color: var(--primary-50);
            border: 1px dashed var(--primary-300);
            border-radius: var(--radius-md);
            color: var(--primary-600);
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .select-target-btn:hover {
            background-color: var(--primary-100);
            border-color: var(--primary-500);
        }

        /* Modal Footer */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--space-3);
            padding: var(--space-4) var(--space-6) var(--space-6);
            border-top: 1px solid var(--neutral-200);
        }

        /* Buttons */
        .btn {
            padding: var(--space-3) var(--space-6);
            font-size: var(--font-size-base);
            font-weight: 500;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .btn-secondary {
            background-color: white;
            border-color: var(--neutral-300);
            color: var(--neutral-700);
        }

        .btn-secondary:hover {
            background-color: var(--neutral-50);
            border-color: var(--neutral-400);
        }

        .btn-primary {
            background-color: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-600);
        }

        .btn-primary:focus {
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        /* Prototype Background */
        .prototype-background {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.3;
            background: linear-gradient(180deg, var(--neutral-50) 0%, var(--neutral-100) 100%);
            z-index: -1;
        }

        /* Check accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="prototype-background"></div>

    <div class="modal-backdrop">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">新建发布计划</h2>
                <button class="modal-close" aria-label="关闭">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="6" y1="6" x2="14" y2="14"></line>
                        <line x1="14" y1="6" x2="6" y2="14"></line>
                    </svg>
                </button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">
                        选择节目
                        <span class="required">*</span>
                    </label>
                    <select class="form-control">
                        <option value="">请选择已发布的节目</option>
                        <option value="1">春季促销活动-横屏</option>
                        <option value="2">新品上市宣传</option>
                        <option value="3">品牌形象宣传片</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        发布目标
                        <span class="required">*</span>
                    </label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="target-store" name="target-type" value="store" checked>
                            <label for="target-store" class="radio-label">按门店</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="target-device" name="target-type" value="device">
                            <label for="target-device" class="radio-label">按设备</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">选择目标</label>
                    <div class="selected-targets">
                        <span class="target-tag">
                            上海人民广场店
                            <button class="target-tag-remove" aria-label="移除">×</button>
                        </span>
                        <span class="target-tag">
                            上海南京东路店
                            <button class="target-tag-remove" aria-label="移除">×</button>
                        </span>
                    </div>
                    <button class="select-target-btn" style="margin-top: 8px;">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="3" x2="8" y2="13"></line>
                            <line x1="3" y1="8" x2="13" y2="8"></line>
                        </svg>
                        继续选择
                    </button>
                </div>

                <div class="date-row">
                    <div class="form-group">
                        <label class="form-label">
                            生效开始时间
                            <span class="required">*</span>
                        </label>
                        <input type="datetime-local" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">生效结束时间</label>
                        <input type="datetime-local" class="form-control">
                        <p class="help-text">不填表示永久生效</p>
                    </div>
                </div>

                <!-- 新增：播放周期 -->
                <div class="form-group">
                    <label class="form-label">
                        播放周期
                        <span class="required">*</span>
                    </label>
                    <div class="weekday-container">
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-1" class="weekday-checkbox" name="weekday" value="1" checked>
                            <label for="weekday-1" class="weekday-label">周一</label>
                        </div>
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-2" class="weekday-checkbox" name="weekday" value="2" checked>
                            <label for="weekday-2" class="weekday-label">周二</label>
                        </div>
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-3" class="weekday-checkbox" name="weekday" value="3" checked>
                            <label for="weekday-3" class="weekday-label">周三</label>
                        </div>
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-4" class="weekday-checkbox" name="weekday" value="4" checked>
                            <label for="weekday-4" class="weekday-label">周四</label>
                        </div>
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-5" class="weekday-checkbox" name="weekday" value="5" checked>
                            <label for="weekday-5" class="weekday-label">周五</label>
                        </div>
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-6" class="weekday-checkbox" name="weekday" value="6" checked>
                            <label for="weekday-6" class="weekday-label">周六</label>
                        </div>
                        <div class="weekday-item">
                            <input type="checkbox" id="weekday-0" class="weekday-checkbox" name="weekday" value="0" checked>
                            <label for="weekday-0" class="weekday-label">周日</label>
                        </div>
                    </div>
                    <div class="weekday-quick-select">
                        <button type="button" class="quick-select-btn" id="select-workdays">工作日</button>
                        <button type="button" class="quick-select-btn" id="select-weekends">周末</button>
                        <button type="button" class="quick-select-btn" id="select-all">全选</button>
                        <button type="button" class="quick-select-btn" id="clear-all">清空</button>
                    </div>
                    <p class="help-text">只在选中的日期播放该节目，至少选择一天</p>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary">取消</button>
                <button class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <script>
        // Quick selection functionality
        document.getElementById('select-workdays').addEventListener('click', function() {
            document.getElementById('weekday-1').checked = true;
            document.getElementById('weekday-2').checked = true;
            document.getElementById('weekday-3').checked = true;
            document.getElementById('weekday-4').checked = true;
            document.getElementById('weekday-5').checked = true;
            document.getElementById('weekday-6').checked = false;
            document.getElementById('weekday-0').checked = false;
        });

        document.getElementById('select-weekends').addEventListener('click', function() {
            document.getElementById('weekday-1').checked = false;
            document.getElementById('weekday-2').checked = false;
            document.getElementById('weekday-3').checked = false;
            document.getElementById('weekday-4').checked = false;
            document.getElementById('weekday-5').checked = false;
            document.getElementById('weekday-6').checked = true;
            document.getElementById('weekday-0').checked = true;
        });

        document.getElementById('select-all').addEventListener('click', function() {
            document.getElementById('weekday-1').checked = true;
            document.getElementById('weekday-2').checked = true;
            document.getElementById('weekday-3').checked = true;
            document.getElementById('weekday-4').checked = true;
            document.getElementById('weekday-5').checked = true;
            document.getElementById('weekday-6').checked = true;
            document.getElementById('weekday-0').checked = true;
        });

        document.getElementById('clear-all').addEventListener('click', function() {
            document.getElementById('weekday-1').checked = false;
            document.getElementById('weekday-2').checked = false;
            document.getElementById('weekday-3').checked = false;
            document.getElementById('weekday-4').checked = false;
            document.getElementById('weekday-5').checked = false;
            document.getElementById('weekday-6').checked = false;
            document.getElementById('weekday-0').checked = false;
        });
    </script>
</body>
</html>
