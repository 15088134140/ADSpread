<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>縦画面3分割 - Androidクライアント表示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="android-page">
        <div class="android-wrapper">
            <div class="android-info">
                <h1>Android縦画面 - 3分割レイアウト</h1>
                <p>上中下3つの等しいエリア</p>
            </div>
            <div class="android-device">
                <div class="android-screen">
                    <div class="android-notch"></div>
                    <div class="split-container split-3-vertical">
                        <div class="region">
                            <div class="region-content-1">
                                <div class="region-label">エリア 1</div>
                                <div class="region-ad-title">上部広告エリア</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-2">
                                <div class="region-label">エリア 2</div>
                                <div class="region-ad-title">中部広告エリア</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-3">
                                <div class="region-label">エリア 3</div>
                                <div class="region-ad-title">下部広告エリア</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <a href="index.html" class="back-link">ナビゲーションに戻る</a>
        </div>
    </div>
</body>
</html>
