<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="editDevice">设备编辑 - 信发系统管理后台</title>
    <link rel="stylesheet" href="styles.css">
    <script src="i18n.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html">
                    <h1 data-i18n="systemName">信发系统</h1>
                    <p data-i18n="adminPanel">管理后台</p>
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="store-list.html" class="menu-item">
                    <span class="icon">🏪</span><span data-i18n="storeManagement">门店管理</span>
                </a>
                <a href="device-list.html" class="menu-item active">
                    <span class="icon">📺</span><span data-i18n="deviceManagement">设备管理</span>
                </a>
                <a href="program-list.html" class="menu-item">
                    <span class="icon">🎬</span><span data-i18n="programProduction">节目制作</span>
                </a>
                <a href="material.html" class="menu-item">
                    <span class="icon">🖼️</span><span data-i18n="materialManagement">素材管理</span>
                </a>
                <a href="publish.html" class="menu-item">
                    <span class="icon">📤</span><span data-i18n="publishManagement">发布管理</span>
                </a>
                <div class="menu-group">
                    <div class="menu-group-title" data-i18n="systemManagement">系统管理</div>
                    <a href="admin-list.html" class="menu-item menu-item-child">
                        <span class="icon">👤</span><span data-i18n="accountManagement">账号管理</span>
                    </a>
                    <a href="role-list.html" class="menu-item menu-item-child">
                        <span class="icon">👥</span><span data-i18n="roleManagement">角色管理</span>
                    </a>
                    <a href="menu-list.html" class="menu-item menu-item-child">
                        <span class="icon">📋</span><span data-i18n="menuManagement">菜单管理</span>
                    </a>
                    <a href="operation-log.html" class="menu-item menu-item-child">
                        <span class="icon">📝</span><span data-i18n="operationLog">操作日志</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <p>v1.2.0</p>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumb">
                    <a href="device-list.html" data-i18n="deviceManagement">设备管理</a>
                    <span>/</span>
                    <strong data-i18n="editDevice">编辑设备</strong>
                </div>
                <div class="user-info">
                    <!-- 语言切换器 -->
                    <div class="lang-switcher">
                        <div class="lang-selector">
                            <span class="lang-current-flag">🇯🇵</span>
                            <span class="lang-current-text">日本語</span>
                            <span>▼</span>
                        </div>
                        <div class="lang-dropdown">
                            <div class="lang-option" data-lang="ja">
                                <span class="lang-flag">🇯🇵</span>
                                <span data-i18n="japanese">日本語</span>
                            </div>
                            <div class="lang-option" data-lang="zh">
                                <span class="lang-flag">🇨🇳</span>
                                <span data-i18n="chinese">中文</span>
                            </div>
                            <div class="lang-option" data-lang="en">
                                <span class="lang-flag">🇺🇸</span>
                                <span data-i18n="english">English</span>
                            </div>
                        </div>
                    </div>
                    <span class="user-name">admin</span>
                    <a href="admin-login.html" class="btn-logout" data-i18n="logout">退出</a>
                </div>
            </header>

            <div class="content">
                <div class="page-header">
                    <h2 class="page-title" data-i18n="editDevice">编辑设备</h2>
                </div>

                <div class="form-container">
                    <form>
                        <div class="form-group">
                            <label class="form-label" for="storeId" data-i18n="belongStore">所属店舗</label>
                            <select id="storeId" class="form-select">
                                <option value="" selected>店舗を選択（任意、空欄可）</option>
                                <option value="1">渋谷旗艦店</option>
                                <option value="2">新宿店</option>
                                <option value="3">銀座センター店</option>
                                <option value="4">池袋パルコ店</option>
                                <option value="5">横浜ランドマーク店</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="deviceName" data-i18n="deviceName">デバイス名 <span style="color: var(--danger-500)">*</span></label>
                            <input type="text" id="deviceName" class="form-input" value="入口大型ディスプレイ" data-i18n-placeholder="enterDeviceName" placeholder="デバイス名を入力してください">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="deviceCode" data-i18n="deviceCode">デバイスコード <span style="color: var(--danger-500)">*</span></label>
                            <input type="text" id="deviceCode" class="form-input" value="DEV001" data-i18n-placeholder="enterDeviceCode" placeholder="一意のデバイスコードを入力してください">
                            <p style="font-size: 0.75rem; color: var(--gray-500); margin-top: 4px;">デバイスコードはシステム全体で一意、Androidクライアントが番組を取得する際に使用します</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" data-i18n="screenOrientation">画面方向</label>
                            <div style="display: flex; gap: 24px; margin-top: 8px;">
                                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                    <input type="radio" name="orientation" checked>
                                    <span data-i18n="landscape">横画面</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                    <input type="radio" name="orientation">
                                    <span data-i18n="portrait">縦画面</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">画面分割タイプ</label>
                            <select class="form-select">
                                <option value="">画面分割タイプを選択</option>
                                <option value="1">1分割 - 全画面1エリア</option>
                                <option value="2">2分割 - 上下2エリア</option>
                                <option value="3">3分割 - 水平3エリア</option>
                                <option value="3-1" selected>3-1分割 - 左側1/2、右側上下各1/4</option>
                                <option value="4">4分割 - 田の字4エリア</option>
                            </select>
                            <div style="margin-top: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;">
                                <div style="border: 1px solid var(--gray-300); border-radius: 4px; padding: 4px; text-align: center; font-size: 11px; background: var(--gray-50);">1分割</div>
                                <div style="border: 1px solid var(--gray-300); border-radius: 4px; padding: 4px; text-align: center; font-size: 11px; background: var(--gray-50);">2分割</div>
                                <div style="border: 1px solid var(--gray-300); border-radius: 4px; padding: 4px; text-align: center; font-size: 11px; background: var(--gray-50);">3分割</div>
                                <div style="border: 2px solid var(--primary-500); border-radius: 4px; padding: 4px; text-align: center; font-size: 11px; background: var(--primary-50);">3-1分割</div>
                                <div style="border: 1px solid var(--gray-300); border-radius: 4px; padding: 4px; text-align: center; font-size: 11px; background: var(--gray-50);">4分割</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" data-i18n="screenResolution">画面解像度 <span style="color: var(--danger-500)">*</span></label>
                            <select class="form-select">
                                <option value="">解像度を選択</option>
                                <option value="1920x1080" selected>1920 × 1080 (FHD)</option>
                                <option value="3840x2160">3840 × 2160 (4K)</option>
                                <option value="1080x1920">1080 × 1920 (縦画面FHD)</option>
                                <option value="720x1280">720 × 1280 (縦画面HD)</option>
                                <option value="1280x720">1280 × 720 (HD)</option>
                                <option value="custom">+ カスタム追加...</option>
                            </select>
                            <p style="font-size: 0.75rem; color: var(--gray-500); margin-top: 4px;">プリセット解像度を選択するか、カスタムで新しい解像度を追加できます</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="remark" data-i18n="remarks">備考</label>
                            <textarea id="remark" class="form-input" style="min-height: 80px;" data-i18n-placeholder="enterRemarks" placeholder="デバイスの不具合やその他備考を記入できます">キャビネット故障</textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" data-i18n="status">ステータス</label>
                            <div style="display: flex; gap: 24px; margin-top: 8px;">
                                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                    <input type="radio" name="status" checked>
                                    <span data-i18n="enabled">有効</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                    <input type="radio" name="status">
                                    <span data-i18n="disabled">無効</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-actions">
                            <a href="device-list.html" class="btn btn-outline" data-i18n="cancel">キャンセル</a>
                            <button type="submit" class="btn btn-primary" data-i18n="save">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
