<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店编辑 - 信发系统管理后台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>信发系统</h1>
                <p>管理后台</p>
            </div>
            <nav class="sidebar-menu">
                <a href="store-list.html" class="menu-item active">
                    <span class="icon">🏪</span>门店管理
                </a>
                <a href="device-list.html" class="menu-item">
                    <span class="icon">📺</span>设备管理
                </a>
                <a href="program-list.html" class="menu-item">
                    <span class="icon">🎬</span>节目制作
                </a>
                <a href="material.html" class="menu-item">
                    <span class="icon">🖼️</span>素材管理
                </a>
                <a href="publish.html" class="menu-item">
                    <span class="icon">📤</span>发布管理
                </a>
                <a href="admin-list.html" class="menu-item">
                    <span class="icon">👤</span>管理员账号管理
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>v1.0.0</p>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumb">
                    <a href="store-list.html">门店管理</a>
                    <span>/</span>
                    <strong>编辑门店</strong>
                </div>
                <div class="user-info">
                    <span class="user-name">admin</span>
                    <a href="admin-login.html" class="btn-logout">退出</a>
                </div>
            </header>

            <div class="content">
                <div class="page-header">
                    <h2 class="page-title">编辑门店</h2>
                </div>

                <div class="form-container">
                    <form>
                        <div class="form-group">
                            <label class="form-label" for="storeName">门店名称 <span style="color: var(--danger-500)">*</span></label>
                            <input type="text" id="storeName" class="form-input" value="中关村旗舰店" placeholder="请输入门店名称">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="storeCode">门店编码 <span style="color: var(--danger-500)">*</span></label>
                            <input type="text" id="storeCode" class="form-input" value="SH001" placeholder="请输入唯一门店编码">
                            <p style="font-size: 0.75rem; color: var(--gray-500); margin-top: 4px;">门店编码全局唯一，用于系统内部标识</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="storeAddress">门店地址</label>
                            <textarea id="storeAddress" class="form-textarea" placeholder="请输入门店详细地址">北京市海淀区中关村大街1号</textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="contactName">联系人</label>
                            <input type="text" id="contactName" class="form-input" value="张三" placeholder="请输入联系人姓名">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="contactPhone">联系电话</label>
                            <input type="text" id="contactPhone" class="form-input" value="13800138001" placeholder="请输入联系电话">
                        </div>

                        <div class="form-group">
                            <label class="form-label">状态</label>
                            <div style="display: flex; gap: 24px; margin-top: 8px;">
                                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                    <input type="radio" name="status" checked>
                                    <span>启用</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                    <input type="radio" name="status">
                                    <span>禁用</span>
                                </label>
                            </div>
                            <p style="font-size: 0.75rem; color: var(--gray-500); margin-top: 4px;">禁用后，该门店下所有设备无法接收新广告</p>
                        </div>

                        <div class="form-actions">
                            <a href="store-list.html" class="btn btn-outline">取消</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>

                <!-- 弹窗示例（演示用） -->
                <div style="display: none;">
                    <div class="modal-overlay">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3 class="modal-title">新增门店</h3>
                                <button class="modal-close">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="form-group">
                                    <label class="form-label">门店名称 *</label>
                                    <input type="text" class="form-input" placeholder="请输入门店名称">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">门店编码 *</label>
                                    <input type="text" class="form-input" placeholder="请输入唯一编码">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">地址</label>
                                    <textarea class="form-textarea" placeholder="请输入地址"></textarea>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">联系人</label>
                                    <input type="text" class="form-input" placeholder="请输入联系人">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">联系电话</label>
                                    <input type="text" class="form-input" placeholder="请输入电话">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">状态</label>
                                    <div style="display: flex; gap: 24px;">
                                        <label><input type="radio" name="status" checked> 启用</label>
                                        <label><input type="radio" name="status"> 禁用</label>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-outline">取消</button>
                                <button class="btn btn-primary">确定</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
