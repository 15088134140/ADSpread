<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3分割 - タブレット横表示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="android-page">
        <div class="android-wrapper">
            <div class="android-info">
                <h1>タブレットクライアント - 横画面3分割レイアウト</h1>
                <p>水平3つの等しいエリア - 16:9 横画面</p>
            </div>
            <div class="tablet-device-landscape">
                <div class="tablet-screen-landscape">
                    <div class="tablet-notch-landscape"></div>
                    <div class="split-container split-3-horizontal">
                        <div class="region">
                            <div class="region-content-1">
                                <div class="region-label">エリア 1</div>
                                <div class="region-ad-title">左側広告エリア</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-2">
                                <div class="region-label">エリア 2</div>
                                <div class="region-ad-title">中央広告エリア</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-3">
                                <div class="region-label">エリア 3</div>
                                <div class="region-ad-title">右側広告エリア</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <a href="index.html" class="back-link">ナビゲーションに戻る</a>
        </div>
    </div>
</body>
</html>
