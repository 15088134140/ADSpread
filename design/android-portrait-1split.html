<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竖屏1分屏 - 安卓客户端展示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="android-page">
        <div class="android-wrapper">
            <div class="android-info">
                <h1>安卓竖屏 - 1分屏布局</h1>
                <p>全屏一个区域</p>
            </div>
            <div class="android-device">
                <div class="android-screen">
                    <div class="android-notch"></div>
                    <div class="split-container split-1">
                        <div class="region">
                            <div class="region-content-1">
                                <div class="region-label">区域 1</div>
                                <div class="region-ad-title">全屏广告展示区</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <a href="index.html" class="back-link">返回导航页</a>
        </div>
    </div>

</html>
