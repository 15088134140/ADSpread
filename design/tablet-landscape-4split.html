<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4分屏 - 平板横向展示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="android-page">
        <div class="android-wrapper">
            <div class="android-info">
                <h1>平板客户端 - 横向4分屏布局</h1>
                <p>田字格四个相等区域 - 16:9 横向</p>
            </div>
            <div class="tablet-device-landscape">
                <div class="tablet-screen-landscape">
                    <div class="tablet-notch-landscape"></div>
                    <div class="split-container split-4-grid-landscape">
                        <div class="region">
                            <div class="region-content-1">
                                <div class="region-label">区域 1</div>
                                <div class="region-ad-title">左上广告区</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-2">
                                <div class="region-label">区域 2</div>
                                <div class="region-ad-title">右上广告区</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-3">
                                <div class="region-label">区域 3</div>
                                <div class="region-ad-title">左下广告区</div>
                            </div>
                        </div>
                        <div class="region">
                            <div class="region-content-4">
                                <div class="region-label">区域 4</div>
                                <div class="region-ad-title">右下广告区</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <a href="index.html" class="back-link">返回导航页</a>
        </div>
    </div>
</body>
</html>
