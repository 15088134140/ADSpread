version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: adspread-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-adspread}
      MYSQL_USER: ${MYSQL_USER:-adspread}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - adspread-network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_buffer_pool_size=256M
      - --max_connections=200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: adspread-redis
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - adspread-network
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: ./infra/docker/backend/Dockerfile
    container_name: adspread-backend
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      DATABASE_URL: mysql://${MYSQL_USER:-adspread}:${MYSQL_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-adspread}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/apps/backend/uploads
    networks:
      - adspread-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Admin Web
  admin:
    build:
      context: .
      dockerfile: ./infra/docker/admin/Dockerfile
    container_name: adspread-admin
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${ADMIN_PORT:-80}:80"
    networks:
      - adspread-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  adspread-network:
    driver: bridge
